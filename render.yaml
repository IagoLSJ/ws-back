services:
  - type: web
    name: multinegocio-api
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: "3000"
      - key: DATABASE_URL
        fromDatabase:
          name: multinegocio-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 7d
      - key: CORS_ORIGIN
        value: https://multinegocio.vercel.app
      - key: MINIO_ENDPOINT
        sync: false
      - key: MINIO_PORT
        value: "443"
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MINIO_BUCKET
        value: multinegocio
      - key: MINIO_USE_SSL
        value: "true"
      - key: MINIO_PUBLIC_URL
        sync: false

databases:
  - name: multinegocio-db
    plan: free
    databaseName: multinegocio
    user: multinegocio
